# Cron schedule — paste this into your system crontab:
# 0 9 * * *  cd /path/to/tokoro/crawler && npm run crawl-jobs
cron: "0 9 * * *"

jobs:
  - name: "Eventi Le Serre: "
    urls:
      - https://leserre.co/en/calendario-eventi/
    mode: discover
    fetcher: playwright

  - name: "Kino Siska"
    urls:
      - https://www.kinosiska.si/en/dogodek/
    mode: direct
    fetcher: playwright

  - name: "CSS Udine"
    urls:
      - https://www.cssudine.it/
    mode: direct
    fetcher: playwright

  - name: "Capitol Pordenone"
    urls:
      - https://capitolpordenone.com/programmazione/
    mode: direct
    fetcher: playwright



    


    
